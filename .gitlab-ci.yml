image: gradle:8.14.2-jdk17

variables:
  PROJECT_NAME: "${CI_PROJECT_NAME}"
  JFROG_PUSH_URL: ${JFROG_BASE_URL}/${JFROG_REPOSITORY}
  ARTIFACT_NAME: ${CI_PROJECT_NAME}_${CI_COMMIT_SHORT_SHA}.jar

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - echo "Building the project..."
    - ./gradlew build -x test
    - JAR_FILE="$(ls build/libs/*.jar)"
    - echo "$JAR_FILE"
    - mv $JAR_FILE $ARTIFACT_NAME
    - SHA256=$(sha256sum "$ARTIFACT_NAME" | awk '{print $1}')
    - SHA256_HEADER="X-Checksum-Sha256":" ${SHA256}"
    - echo "Uploading to JFROG..."
    - echo $JFROG_PUSH_URL
    - echo $ARTIFACT_NAME
    - ls -l $ARTIFACT_NAME
    - curl -u "$JFROG_USERNAME:$JFROG_PASSWORD" -H $SHA256_HEADER -T "$ARTIFACT_NAME" "$JFROG_PUSH_URL/$ARTIFACT_NAME"
  artifacts:
    paths:
      - build/libs/*.jar

deploy:
  stage: deploy
  needs: ["build"]
  before_script:
    - apt-get update -qq && apt-get install -y sshpass
  script:
    - sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_IP "
      mkdir -p $PROJECT_NAME && cd $PROJECT_NAME;
      echo 'Stopping existing SimpleServer process...';
      pid=\$(ps aux | grep $PROJECT_NAME | grep -v grep | awk '{print \$2}');
      if [ -n \"\$pid\" ]; then
        kill -9 \$pid && echo 'Process stopped.';
      else
        echo 'No existing process found.';
      fi && \
      apt-get update -y;
      apt-get install -y curl;
      curl -u "$JFROG_USERNAME:$JFROG_PASSWORD" -O "$JFROG_PUSH_URL/$ARTIFACT_NAME"
      java -jar $ARTIFACT_NAME
      "
    - echo "Deploying to VPS..."
