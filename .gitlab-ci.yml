image: gradle:jdk17

variables:
  PROJECT_NAME: "${CI_PROJECT_NAME}"

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - echo "Building the project..."
    - ./gradlew build -x test
  artifacts:
    paths:
      - build/libs/*.jar   # keep build artifact for deployment

deploy:
  stage: deploy
  script:
    - echo "$VPS_PASSWORD" | sshpass ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_IP "
      cd $PROJECT_NAME || exit 1
      git pull origin main
      pkill -f 'gradlew bootRun' || true
      nohup java -jar build/libs/*.jar > log.txt 2>&1 &
      "
  only:
    - main
