image: public.ecr.aws/aws-cli/aws-cli

variables:
  PROJECT_NAME: "${CI_PROJECT_NAME}"
  JFROG_PUSH_URL: ${JFROG_BASE_URL}/${JFROG_REPOSITORY}
  ARTIFACT_NAME: ${CI_PROJECT_NAME}_${CI_COMMIT_SHORT_SHA}.jar

stages:
  - assumeRole
  - build
  - deploy

assumeRole:
    stage: assumeRole
    variables:
      GIT_STRATEGY: none
    id_tokens:
      GITLAB_OIDC_TOKEN:
        aud: https://gitlab.com
    script:
      - aws sts assume-role-with-web-identity --role-arn $ROLE_ARN --web-identity-token "$GITLAB_OIDC_TOKEN"
      - aws ecr get-login-password | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

build:
  stage: build
  script:
    - echo "Building the project..."
    - ./gradlew shadowJar
    - JAR_FILE="$(ls build/libs/*.jar)"
    - echo "$JAR_FILE"
    - mv $JAR_FILE $ARTIFACT_NAME
    - ls -l $ARTIFACT_NAME
  artifacts:
    paths:
      - build/libs/*.jar

deploy:
  stage: deploy
  needs: ["build"]
  before_script:
    - apt-get update -qq && apt-get install -y sshpass
  script:
    - sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_IP "
      mkdir -p $PROJECT_NAME && cd $PROJECT_NAME;
      whoami;
      echo 'Stopping existing SimpleServer process...';
      pid=\$(ps aux | grep $PROJECT_NAME | grep -v grep | awk '{print \$2}');
      if [ -n \"\$pid\" ]; then
        kill -9 \$pid && echo 'Process stopped.';
      else
        echo 'No existing process found.';
      fi;
      curl -u "$JFROG_USERNAME:$JFROG_PASSWORD" -O "$JFROG_PUSH_URL/$ARTIFACT_NAME";
      ls -l $ARTIFACT_NAME;
      nohup java -jar $ARTIFACT_NAME > file.txt 2>&1 &
      "
    - echo "Deploying to VPS..."
