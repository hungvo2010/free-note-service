variables:
  PROJECT_NAME: "${CI_PROJECT_NAME}"
  JFROG_PUSH_URL: ${JFROG_BASE_URL}/${JFROG_REPOSITORY}
  ARTIFACT_NAME: ${CI_PROJECT_NAME}_${CI_COMMIT_SHORT_SHA}.jar
  DOCKER_IMAGE: 221082202356.dkr.ecr.eu-west-3.amazonaws.com/forgeblast/forgeblast-backend:${CI_COMMIT_SHORT_SHA}
  DOCKER_IMAGE_WITH_TAG: 221082202356.dkr.ecr.eu-west-3.amazonaws.com/forgeblast/forgeblast-backend:${CI_COMMIT_TAG}_${CI_COMMIT_SHORT_SHA}

stages:
  - assumeRole
  - credentials
  - validate
  - test
  - build
  - register-schema
  - deploy

assumeRole:
    image:
      name: bentolor/docker-dind-awscli
      entrypoint: [ "" ]
    stage: assumeRole
    variables:
      GIT_STRATEGY: none
    id_tokens:
      GITLAB_OIDC_TOKEN:
        aud: https://gitlab.com
#    before_script:
#      - python --version
#      - wget https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -O awscliv2.zip
#      - unzip awscliv2.zip
#      - ./aws/install -i $HOME/aws-cli -b $HOME/bin
#      - export PATH="$HOME/bin:$PATH"
#      - aws --version
    script:
      - eval $(aws sts assume-role-with-web-identity --role-arn "$ROLE_ARN" --web-identity-token "$GITLAB_OIDC_TOKEN" --role-session-name my-session --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text | awk '{print "export AWS_ACCESS_KEY_ID="$1"\nexport AWS_SECRET_ACCESS_KEY="$2"\nexport AWS_SESSION_TOKEN="$3}')
#      - aws ecr get-login-password --region eu-west-3 | docker login --username AWS --password-stdin 221082202356.dkr.ecr.eu-west-3.amazonaws.com
      - echo $DOCKER_IMAGE
#      - docker build -t $DOCKER_IMAGE .
#      - docker push $DOCKER_IMAGE
      - aws ecr describe-repositories --repository-names forgeblast/forgeblast-backend --region eu-west-3
      - printf "AWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\nAWS_SESSION_TOKEN=%s\nAWS_REGION=%s\n" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" "$AWS_SESSION_TOKEN" "$AWS_REGION" > aws.env
      - rm -f .docker/config.json && mkdir -p .docker && aws ecr get-login-password --region eu-west-3 | awk '{print "AWS:"$0}' | base64 | awk '{print "{\"auths\":{\"221082202356.dkr.ecr.eu-west-3.amazonaws.com\":{\"auth\":\""$0"\"}}}"}' > .docker/config.json
    artifacts:
      reports:
        dotenv: aws.env
      paths:
        - .docker/config.json
      expire_in: 1h
    rules:
      - when: on_success

credential helpers:
  stage: credentials
  image: alpine
  before_script:
    - mkdir credentials-binaries
  script:
    - wget -O credentials-binaries/docker-credential-ecr-login https://amazon-ecr-credential-helper-releases.s3.us-east-2.amazonaws.com/0.10.0/linux-amd64/docker-credential-ecr-login
    - chmod +x credentials-binaries/docker-credential-ecr-login
    - chown 1000:1000 credentials-binaries/docker-credential-*
  artifacts:
    paths:
      - credentials-binaries/
  rules:
    - when: on_success

validate-asyncapi:
  stage: validate
  image: node:18-alpine
  before_script:
    - npm install -g @asyncapi/cli
  script:
    - echo "Validating AsyncAPI specification..."
    - asyncapi validate asyncapi.yaml
    - echo "✓ AsyncAPI spec is valid"
  rules:
    - when: on_success

spotbugs-check:
  stage: validate
  image: gradle:8.5-jdk17
  script:
    - echo "Running SpotBugs static analysis..."
    - ./gradlew spotbugsMain spotbugsTest
    - echo "✓ SpotBugs analysis passed"
  artifacts:
    paths:
      - "**/build/reports/spotbugs/"
    expire_in: 1 week
  rules:
    - when: on_success

schema-validation-tests:
  stage: test
  image: gradle:8.5-jdk17
  needs:
    - validate-asyncapi
  before_script:
    - echo "Running schema validation tests..."
  script:
    - ./gradlew :free-draw:test --tests "*SchemaValidation*"
    - echo "✓ Schema validation tests passed"
  artifacts:
    reports:
      junit: free-draw/build/test-results/test/**/TEST-*.xml
    paths:
      - free-draw/build/reports/tests/
  rules:
    - when: on_success

build:
  image:
    name: moby/buildkit:rootless
    entrypoint: [ "" ]
  needs:
    - assumeRole
    - credential helpers
    - schema-validation-tests
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  stage: build
  before_script:
    - mkdir -p ~/.docker
    - export PATH="${CI_PROJECT_DIR}/credentials-binaries:$PATH"
    - |
      cat > ~/.docker/config.json <<EOF
      {
        "credHelpers": {
          "221082202356.dkr.ecr.eu-west-3.amazonaws.com": "ecr-login"
        }
      }
      EOF
  script:
    - echo "AWS identity (from dotenv):"
    - echo "$AWS_ACCESS_KEY_ID"
    - echo "Building image with BuildKit (daemonless) - commit"
    - cat $CI_PROJECT_DIR/.docker/config.json
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --output type=image,name=$DOCKER_IMAGE,push=true
  artifacts:
    paths:
      - build/libs/*.jar
  rules:
    - when: on_success

register-schema:
  stage: register-schema
  image: alpine:latest
  needs:
    - build
  before_script:
    - apk add --no-cache curl jq bash
  script:
    - echo "Registering AsyncAPI schema to Apicurio Registry..."
    - chmod +x register-schemas.sh
    - ./register-schemas.sh
    - echo "✓ Schema registered successfully"
  rules:
    # - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
    #   when: on_success
    # - when: manual
  allow_failure: false

deploy:
  stage: deploy
  needs:
    - build
    - credential helpers
    - register-schema
  before_script:
    - apt-get update -qq && apt-get install -y sshpass
    - mkdir -p ~/.docker
    - export PATH="${CI_PROJECT_DIR}/credentials-binaries:$PATH"
    - |
      cat > ~/.docker/config.json <<EOF
      {
        "credHelpers": {
          "221082202356.dkr.ecr.eu-west-3.amazonaws.com": "ecr-login"
        }
      }
      EOF
  script:
    - |
      sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_IP "
        aws ecr get-login-password --region eu-west-3 \
        | docker login --username AWS --password-stdin 221082202356.dkr.ecr.eu-west-3.amazonaws.com &&
        docker pull $DOCKER_IMAGE &&
        docker ps -a --filter 'name=free_note_service' --format '{{.Names}}' | xargs -r docker stop &&
        docker ps -a --filter 'name=free_note_service' --format '{{.Names}}' | xargs -r docker rm &&
        docker run -d --name free_note_service_${CI_COMMIT_SHORT_SHA} -p 8189:8189 --restart always $DOCKER_IMAGE
      "
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
