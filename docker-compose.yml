version: '3.8'

services:
  apicurio-registry:
    image: apicurio/apicurio-registry:2.5.8.Final
    ports:
      - "9081:8080"
    environment:
      REGISTRY_LOG_LEVEL: INFO
      QUARKUS_PROFILE: prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    stdin_open: true
    tty: true
