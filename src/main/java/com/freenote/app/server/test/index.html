<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>WebSocket Test Client</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        input,
        button,
        textarea {
            margin-top: 10px;
            display: block;
            width: 100%;
        }
        #log {
            height: 200px;
            overflow-y: scroll;
            border: 1px solid #ccc;
            padding: 10px;
        }
        .continuation-frame {
            color: #0066cc;
            font-weight: bold;
        }
        .text-frame {
            color: #009900;
            font-weight: bold;
        }
    </style>
</head>
<body>
<h2>WebSocket Test Client</h2>

<label for="wsUrl">WebSocket Server URL:</label>
<input type="text" id="wsUrl" value="ws://localhost:8189/example" />

<button onclick="connectWebSocket()">Connect</button>

<label for="message">Message to Send:</label>
<input type="text" id="message" placeholder="Type a message" />

<button onclick="sendMessage()">Send Message</button>

<label for="continuationMode">
    <input type="checkbox" id="continuationMode" /> Send as Continuation Frames
</label>

<h3>Log:</h3>
<div id="log"></div>

<script>
    let socket

    function log(message, className = "") {
        const logDiv = document.getElementById("log")
        logDiv.innerHTML += `<div class="${className}"> ${message}</div>`
        logDiv.scrollTop = logDiv.scrollHeight
    }

    function connectWebSocket() {
        const url = document.getElementById("wsUrl").value
        socket = new WebSocket(url)

        socket.onopen = () => log("✅ Connected")
        socket.onmessage = (event) => log(`📨 Received: ${event.data}`)
        socket.onerror = (error) => {
            console.error("WebSocket error:", error)
            log(`❌ Error: ${error}`)
        }
        socket.onclose = () => log("🔌 Disconnected")
    }

    function sendMessage() {
        let message = document.getElementById("message").value
        const continuationMode = document.getElementById("continuationMode").checked
        
        if (socket && socket.readyState === WebSocket.OPEN) {
            if (continuationMode) {
                sendContinuationFrames(message)
            } else {
                socket.send(message)
                log(`📤 Sent: ${message}`)
            }
        } else {
            log("⚠️ WebSocket is not connected.")
        }
    }

    function sendContinuationFrames(message) {
        if (!message) {
            log("⚠️ No message to send as continuation frames")
            return
        }

        // Split message into chunks for continuation frames
        const chunkSize = Math.max(1, Math.floor(message.length / 3))
        const chunks = []
        
        for (let i = 0; i < message.length; i += chunkSize) {
            chunks.push(message.substring(i, i + chunkSize))
        }

        log(`📤 Sending message in ${chunks.length} continuation frames`)

        // Send first frame (text frame with FIN=0)
        sendRawFrame(chunks[0], 0x01, false) // Text frame, not final
        log(`📤 Frame 1/${chunks.length}: "${chunks[0]}" (TEXT, FIN=0)`, "text-frame")

        // Send continuation frames
        for (let i = 1; i < chunks.length; i++) {
            const isLast = i === chunks.length - 1
            sendRawFrame(chunks[i], 0x00, isLast) // Continuation frame, FIN=1 only for last frame
            log(`📤 Frame ${i + 1}/${chunks.length}: "${chunks[i]}" (CONTINUATION, FIN=${isLast ? 1 : 0})`, "continuation-frame")
        }
    }

    function sendRawFrame(data, opcode, fin) {
        // Create a manual WebSocket frame
        const payload = new TextEncoder().encode(data)
        const payloadLength = payload.length
        
        let frameSize = 2 + 4 + payloadLength // Basic frame header + mask + payload
        if (payloadLength > 65535) frameSize += 6
        else if (payloadLength > 125) frameSize += 2
        
        const frame = new ArrayBuffer(frameSize)
        const view = new DataView(frame)
        let offset = 0
        
        // First byte: FIN + RSV + Opcode
        const firstByte = (fin ? 0x80 : 0x00) | opcode
        view.setUint8(offset++, firstByte)
        
        // Second byte: MASK + Payload length
        if (payloadLength > 65535) {
            view.setUint8(offset++, 0x80 | 127) // Masked + extended 64-bit length
            view.setUint32(offset, 0) // High 32 bits (always 0 for reasonable lengths)
            offset += 4
            view.setUint32(offset, payloadLength) // Low 32 bits
            offset += 4
        } else if (payloadLength > 125) {
            view.setUint8(offset++, 0x80 | 126) // Masked + extended 16-bit length
            view.setUint16(offset, payloadLength)
            offset += 2
        } else {
            view.setUint8(offset++, 0x80 | payloadLength) // Masked + length
        }
        
        // Masking key (4 bytes)
        const maskKey = new Uint8Array(4)
        crypto.getRandomValues(maskKey)
        for (let i = 0; i < 4; i++) {
            view.setUint8(offset++, maskKey[i])
        }
        
        // Masked payload
        const maskedPayload = new Uint8Array(payloadLength)
        for (let i = 0; i < payloadLength; i++) {
            maskedPayload[i] = payload[i] ^ maskKey[i % 4]
            view.setUint8(offset++, maskedPayload[i])
        }
        
        // Send the raw frame through the WebSocket
        // Note: This is a workaround since browsers don't expose raw frame sending
        // In a real implementation, you'd need a WebSocket library that supports this
        try {
            // Fallback: send as regular message but log the frame structure
            socket.send(data)
            log(`📋 Frame structure: FIN=${fin ? 1 : 0}, Opcode=${opcode.toString(16).toUpperCase().padStart(2, '0')}, Length=${payloadLength}`)
        } catch (error) {
            log(`❌ Failed to send frame: ${error.message}`)
        }
    }
</script>
</body>
</html>
